name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    name: Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          registry-url: "https://npm.pkg.github.com"
          scope: "@nekochans"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          LGTMEOW_API_URL: ${{ secrets.LGTMEOW_API_URL }}
          NODE_AUTH_TOKEN: ${{ secrets.AUTH_TOKEN_FOR_GITHUB_PACKAGES }}

      - name: Verify Agents Skills Synced
        run: |
          npm run sync:agents-skills
          if ! git diff --quiet -- .claude/skills; then
            echo "::error title=Agents skills not synced::.agents/skills と .claude/skills が同期されていません。npm run sync:agents-skills を実行して変更をコミットしてください。"
            git status --short -- .claude/skills
            git diff --stat -- .claude/skills
            exit 1
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint and Test
        run: |
          npm run lint
          npm run test:ci
        env:
          LGTMEOW_API_URL: ${{ secrets.LGTMEOW_API_URL }}
          NODE_AUTH_TOKEN: ${{ secrets.AUTH_TOKEN_FOR_GITHUB_PACKAGES }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}
          COGNITO_TOKEN_ENDPOINT: ${{ secrets.COGNITO_TOKEN_ENDPOINT }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
